[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crashboard-sdk"
version = "1.0.0"
description = "Chaos-as-a-Service SDK: drop chaos engineering + an auto-generated Grafana dashboard into any microservice repo with one line."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "CrashBoard Team" }]
keywords = ["chaos-engineering", "observability", "prometheus", "grafana", "fault-injection", "sre"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Monitoring",
    "Topic :: Software Development :: Testing",
]

# Runtime deps for the in-process SDK (`crashboard.init`) and the CLI only.
# Redis / Kafka client libraries are intentionally NOT required: the SDK patches
# client objects you pass in, so you bring your own. The bundled chaos-engine and
# metric-collector install their own pinned requirements at container build time.
dependencies = [
    "click>=8.0",
    "pyyaml>=5.4",
    "requests>=2.25",
    "fastapi>=0.95",
    "prometheus-fastapi-instrumentator>=6.0",
    "prometheus-client>=0.16",
]

[project.urls]
Homepage = "https://github.com/crashboard/crashboard-sdk"
Documentation = "https://github.com/crashboard/crashboard-sdk#readme"

[project.scripts]
crashboard = "crashboard.cli:main"

[tool.setuptools.packages.find]
include = ["crashboard*"]

[tool.setuptools.package-data]
crashboard = [
    "templates/*",
    "infra/chaos-engine/*",
    "infra/metric-collector/*",
]
