version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning/datasources/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./infrastructure/grafana/provisioning/dashboards/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./infrastructure/grafana/dashboards/crashboard.json:/etc/grafana/provisioning/dashboards/crashboard.json
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml
    command: -config.file=/etc/loki/loki-config.yaml

  metric-collector:
    build: ../services/metric-collector
    container_name: metric-collector
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - prometheus

  chaos-engine:
    build: ../chaos-engine
    container_name: chaos-engine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - SERVICE_NAME=chaos-engine
    depends_on:
      - prometheus

  dashboard-backend:
    build: ../dashboard/backend
    container_name: dashboard-backend
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - SERVICE_NAME=dashboard-backend
    depends_on:
      - prometheus

  dashboard-frontend:
    build: ../dashboard/frontend
    container_name: dashboard-frontend
    depends_on:
      - dashboard-backend
