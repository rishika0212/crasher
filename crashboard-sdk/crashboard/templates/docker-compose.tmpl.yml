# CrashBoard observability + chaos overlay.
# Generated into .crashboard/ by `crashboard init`. All build contexts are
# self-contained inside .crashboard/ (engine/ and collector/ are copied from the
# installed SDK), so this overlay drops into ANY repo without extra source.
#
# Run it merged with your own compose:
#   docker compose -f docker-compose.yml -f .crashboard/docker-compose.crashboard.yml up -d --build
# (or just `crashboard up`)
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning/datasources/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./infrastructure/grafana/provisioning/dashboards/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./infrastructure/grafana/dashboards/crashboard.json:/etc/grafana/provisioning/dashboards/crashboard.json
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml
    command: -config.file=/etc/loki/loki-config.yaml

  # Exposes per-container CPU/memory/status to Prometheus via the Docker socket.
  metric-collector:
    build: ./collector
    container_name: metric-collector
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - prometheus

  # Fault-injection API. Published on 8080 so `crashboard trigger` can reach it
  # from the host without colliding with your app services on 8000.
  chaos-engine:
    build: ./engine
    container_name: chaos-engine
    ports:
      - "8080:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - SERVICE_NAME=chaos-engine
    depends_on:
      - prometheus
