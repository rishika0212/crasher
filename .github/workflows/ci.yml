name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # The SDK is imported by the services under test (editable install).
          pip install -e ./crashboard-sdk
          # Union of runtime deps needed to import every service in-process.
          pip install \
            -r services/user-service/requirements.txt \
            -r services/order-service/requirements.txt \
            -r services/notif-service/requirements.txt \
            -r chaos-engine/requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff — error-level rules)
        # Catches real defects (syntax errors, undefined names, bad asserts).
        # Full style enforcement is added separately via ruff.toml + pre-commit.
        run: ruff check --select E9,F63,F7,F82 .

      - name: Run tests
        run: pytest -ra

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build all service images
        run: docker compose build
